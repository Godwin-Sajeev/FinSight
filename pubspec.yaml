name: smart_upi_app
description: Smart UPI Monitor - AI Finance App
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Charts
  fl_chart: ^0.66.0

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # UI & Theming
  google_fonts: ^6.1.0
  lucide_icons: 0.257.0
  gap: ^3.0.1
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true