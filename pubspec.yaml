name: smart_upi_app
description: Smart UPI Monitor - AI Finance App
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Charts
  fl_chart: ^0.66.0

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # UI & Theming
  google_fonts: ^6.1.0
  lucide_icons: 0.257.0
  gap: ^3.0.1
  uuid: ^4.5.3

  # HTTP client for ML/NLP API
  http: ^1.2.1

  # Real SMS Reading
  flutter_sms_inbox: ^1.0.4
  permission_handler: ^11.3.1

  # Authentication UI & Persistence
  shared_preferences: ^2.2.2
  pin_code_fields: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/